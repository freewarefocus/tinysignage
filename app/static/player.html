<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TinySignage Player</title>
    <link rel="stylesheet" href="/static/player.css">
</head>
<body>
    <div id="player">
        <div id="layer-a" class="layer"></div>
        <div id="layer-b" class="layer"></div>
        <div id="zones-container" class="hidden"></div>
        <div id="touch-zones-container"></div>
        <div id="splash">
            <h1>TinySignage</h1>
            <p>Waiting for content...</p>
        </div>
        <div id="registration-overlay" class="hidden">
            <div class="registration-card">
                <h1>Register Display</h1>
                <p>Enter the server URL from your TinySignage administrator and a name for this display.</p>
                <form id="registration-form">
                    <label for="reg-server-url">Server URL</label>
                    <input type="url" id="reg-server-url" autocomplete="off"
                           placeholder="http://192.168.1.100:8080" spellcheck="false">
                    <label for="reg-display-name">Display Name</label>
                    <input type="text" id="reg-display-name" autocomplete="off"
                           placeholder="Front Entrance Display" spellcheck="false">
                    <button type="submit">Register Display</button>
                    <div id="registration-error" class="hidden"></div>
                </form>
            </div>
        </div>
        <div id="pending-overlay" class="hidden">
            <div class="pending-card">
                <div class="pending-spinner"></div>
                <h1>Waiting for Approval</h1>
                <p id="pending-device-name"></p>
                <p class="pending-hint">An administrator must approve this display before it can show content.</p>
            </div>
        </div>
        <div id="emergency-overlay" class="hidden">
            <div class="emergency-icon">&#9888;</div>
            <div id="emergency-message"></div>
            <div id="emergency-name" class="emergency-label"></div>
        </div>
        <div id="status-indicator" class="status-online" title=""></div>
    </div>
    <script src="/static/player.js"></script>
</body>
</html>
