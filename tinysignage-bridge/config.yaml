# TinySignage GPIO Bridge — Pin Configuration
# Each pin maps to a physical button connected to the Raspberry Pi.
# The bridge broadcasts GPIO events via WebSocket to the player.

websocket_port: 8765

pins:
  - pin: 17
    name: "Button 1"
    pull_up: true
    bounce_time: 0.2
  - pin: 27
    name: "Button 2"
    pull_up: true
    bounce_time: 0.2
  - pin: 22
    name: "Button 3"
    pull_up: true
    bounce_time: 0.2

# Joystick / gamepad support via evdev
# Requires: pip install evdev, Linux only, user must be in 'input' group
joystick:
  enabled: false
  dead_zone: 0.1         # Ignore axis values below this (0.0–1.0)
  axis_threshold: 0.5    # Axis value that triggers an event (0.0–1.0)
  poll_interval: 0.01    # Seconds between device scans
