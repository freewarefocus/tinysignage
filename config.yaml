server:
  host: 0.0.0.0
  port: 8080
  https:
    enabled: true
    cert_file: ./certs/cert.pem
    key_file: ./certs/key.pem
    auto_generate_self_signed: true
storage:
  media_dir: ./media
  db_path: ./db/signage.db
  warning_threshold_mb: 500
display:
  transition_duration: 1.0
  transition_type: fade
  default_duration: 10
  object_fit: contain
player:
  browser: auto
  kiosk: true
cors:
  allowed_origins:
  - '*'
logging:
  level: INFO
  log_dir: ./logs
watchdog:
  enabled: true
  check_interval: 30
  startup_grace: 60
  mode: auto
  cms_fail_threshold: 3
  browser_memory_limit_mb: 1024
  browser_fail_threshold: 2
  log_file: ./logs/watchdog.log
device_id: 9659bdba-1b72-408d-9cad-21716ba4c285
server_url: http://127.0.0.1:18080
